<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>instatomdnotes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="card">
      <img src="frontend_cover.png" class="cover" alt="Carousel to Markdown">
      <div class="card-body">
        <form id="submit-form">
          <div class="form-group" id="passphrase-group">
            <label for="passphrase">Passphrase</label>
            <input
              type="password"
              id="passphrase"
              name="passphrase"
              placeholder="Access passphrase"
              autocomplete="current-password"
            />
          </div>

          <div class="form-group">
            <label for="urls">Paste a URL or text</label>
            <div class="feature-chips">
              <span class="chip chip-ig">📸 Instagram · batch</span>
              <span class="chip chip-url">🔗 Reading list</span>
              <span class="chip chip-text">✏️ AI note</span>
            </div>
            <textarea
              id="urls"
              name="urls"
              placeholder="Instagram URL → carousel note (up to 10)&#10;Plain URLs → saved to reading list (up to 10)&#10;Any text → AI-generated note"
              rows="5"
              autocomplete="off"
            ></textarea>
            <div id="mode-badge" class="mode-badge hidden"></div>
            <p class="hint">Auto-detects mode · max 10 URLs or 10,000 chars</p>
          </div>

          <div class="btn-row">
            <button type="button" id="passphrase-lock" title="Update passphrase">🔒</button>
            <button type="submit" id="submit-btn">Convert</button>
          </div>
        </form>

        <div id="status" class="status hidden"></div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
