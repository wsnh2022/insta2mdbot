name: Process Instagram Post

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Processing mode: instagram | urls | text'
        required: false
        type: string
        default: 'instagram'
      instagram_url:
        description: 'Instagram post URL (mode=instagram only)'
        required: false
        type: string
      content:
        description: 'Raw content: URLs or text body (mode=urls or mode=text)'
        required: false
        type: string
      push_to_notion:
        description: 'Push to Notion (instagram: carousel DB, urls: reading list, text: text notes DB)'
        required: false
        type: boolean
        default: true
      extract_text:
        description: 'Extract text via vision AI (instagram only). False = images only, 1 AI call'
        required: false
        type: boolean
        default: true
      notion_title_override:
        description: 'Override the AI-generated title in Notion (optional)'
        required: false
        type: string

jobs:
  process:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout private notes repo
        uses: actions/checkout@v4
        with:
          repository: wsnh2022/insta2mdbot-notes
          token: ${{ secrets.NOTES_REPO_PAT }}
          path: notes

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run processor
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          INSTAGRAM_URL: ${{ inputs.instagram_url }}
          INSTAGRAM_SESSION_ID: ${{ secrets.INSTAGRAM_SESSION_ID }}
          MODE: ${{ inputs.mode }}
          CONTENT: ${{ inputs.content }}
          EXTRACT_TEXT: ${{ inputs.extract_text }}
        run: python scripts/process.py

      - name: Check duplicate status
        id: check_dup
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/is_duplicate" ]; then
            echo "is_duplicate=true" >> $GITHUB_OUTPUT
          else
            echo "is_duplicate=false" >> $GITHUB_OUTPUT
          fi

      - name: Duplicate detected
        if: ${{ steps.check_dup.outputs.is_duplicate == 'true' }}
        run: echo "Post was already processed — Notion page exists"

      - name: Push to Notion
        if: ${{ inputs.push_to_notion == true || inputs.push_to_notion == 'true' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_READING_LIST_DB_ID: ${{ secrets.NOTION_READING_LIST_DB_ID }}
          NOTION_TEXT_NOTES_DB_ID: ${{ secrets.NOTION_TEXT_NOTES_DB_ID }}
          NOTION_TITLE_OVERRIDE: ${{ inputs.notion_title_override }}
        run: python scripts/notion_push.py

      - name: Commit and push notes
        run: |
          cd notes
          git config user.name "instatomdnotes-bot"
          git config user.email "bot@instatomdnotes"
          git add .
          git diff --cached --quiet && echo "No new notes to commit" && exit 0
          MODE="${{ inputs.mode }}"
          [[ "$MODE" =~ ^(instagram|urls|text)$ ]] || { echo "Invalid mode: $MODE"; exit 1; }
          git commit -m "note(${MODE}): $(date -u +%Y-%m-%d)"
          git push
